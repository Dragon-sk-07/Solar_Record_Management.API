<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    /* SIMPLE PDF-FRIENDLY HEADER - No flex, no complex CSS */
    .pdf-header {
        text-align: center;
        margin-bottom: 12px;
        width: 100%;
        font-family: 'Times New Roman', Times, serif;
    }
    .pdf-header .company-name {
        font-size: 18px;
        font-weight: bold;
        color: #1a5f7a;
        margin: 0;
        padding: 0;
    }
    .pdf-header .address {
        font-size: 10px;
        color: #444;
        margin: 3px 0 0 0;
        padding: 0;
    }
    .pdf-header .contact {
        font-size: 10px;
        color: #333;
        margin: 2px 0;
        padding: 0;
    }
    .pdf-header .msedcl {
        font-size: 11px;
        font-weight: bold;
        margin: 5px 0 0 0;
        padding: 0;
    }
    .pdf-header .msedcl-sub {
        font-size: 9px;
        margin: 0;
        padding: 0;
    }
    .pdf-header .divider {
        border-bottom: 2px solid #1a5f7a;
        margin-top: 6px;
    }
  </style>
</head>
<body>
<div class="pdf-header">
  <div class="company-name">🌞 Arihant Energy Solutions</div>
  <div class="address">Near Anuje Hospital, Kurundwad, Tal-shirol, Dist. Kolhapur - 416301</div>
  <div class="contact">✉️ Email: arihantsolar@gmail.com | 📞 Mob: 9767334454 / 7774855501</div>
  <div class="msedcl">Maharashtra State Electricity Distribution Company Limited</div>
  <div class="msedcl-sub">(A Government of Maharashtra Undertaking)</div>
  <div class="divider"></div>
</div>
</body>
</html>
