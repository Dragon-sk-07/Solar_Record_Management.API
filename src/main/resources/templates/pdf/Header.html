<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    .company-header {
        width: 100%;
        margin-bottom: 15px;
        border-bottom: 2px solid #1a5f7a;
        padding-bottom: 10px;
        font-family: 'Times New Roman', Times, serif;
    }

    /* Top Bar with Contact */
    .contact-bar {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: #333;
        padding-bottom: 5px;
        border-bottom: 1px dashed #ccc;
        margin-bottom: 10px;
    }

    .contact-left, .contact-right {
        font-weight: 500;
    }

    /* Company Logo Section */
    .company-main {
        text-align: center;
        margin: 5px 0;
    }

    .company-name {
        font-size: 22px;
        font-weight: bold;
        color: #1a5f7a;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin: 0;
    }

    .company-tagline {
        font-size: 12px;
        color: #555;
        margin: 3px 0;
        font-style: italic;
    }

    .company-address {
        font-size: 11px;
        color: #444;
        margin: 5px 0;
    }

    .company-contact {
        font-size: 11px;
        color: #1a5f7a;
        font-weight: bold;
        margin: 3px 0;
    }

    /* MSEDCL Sub Header */
    .msedcl-header {
        text-align: center;
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid #333;
    }

    .msedcl-title {
        font-size: 14px;
        font-weight: bold;
        text-transform: uppercase;
        margin: 0;
    }

    .msedcl-subtitle {
        font-size: 11px;
        font-weight: normal;
        margin: 2px 0 0 0;
    }

    .header-divider {
        border-top: 2px solid #1a5f7a;
        margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="company-header">

  <!-- Top Contact Bar -->
  <div class="contact-bar">
    <span class="contact-left">📧 E-mail: arihantsolar@gmail.com</span>
    <span class="contact-right">📞 Mob: 9767334454 / 7774855501</span>
  </div>

  <!-- Company Main Info -->
  <div class="company-main">
    <div class="company-name">🌞 Arihant Energy Solutions</div>
    <div class="company-tagline">Your Trusted Partner in Solar Energy</div>
    <div class="company-address">📍 Near Anuje Hospital, Kurundwad, Tal-shirol, Dist. Kolhapur - 416301</div>
  </div>

  <!-- MSEDCL Header -->
  <div class="msedcl-header">
    <div class="msedcl-title">Maharashtra State Electricity Distribution Company Limited</div>
    <div class="msedcl-subtitle">(A Government of Maharashtra Undertaking)</div>
  </div>

  <div class="header-divider"></div>

</div>
</body>
</html>
