<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
    body {
        margin: 0;
        padding: 0;
        background: white;
    }
    /* SAME AS NET METERING AGREEMENT - IMAGE DISPLAY */
    .photo-page {
        page-break-after: always;
        break-after: page;
    }
    .photo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
    }
    .photo-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    @media print {
        .photo-page {
            page-break-after: always;
            break-after: page;
        }
    }
  </style>
</head>
<body>

<!-- SAME STRUCTURE AS NET METERING STAMP DISPLAY -->
<div th:each="photo : ${sitePhotos}" class="photo-page">
  <div class="photo-container">
    <img class="photo-image" th:src="${photo}" alt="Site Photo"/>
  </div>
</div>

<!-- FALLBACK WHEN NO PHOTOS -->
<div th:if="${sitePhotos == null or sitePhotos.isEmpty()}" class="photo-page">
  <div class="photo-container">
    <div style="text-align: center; font-family: 'Times New Roman', Times, serif; color: #999; font-size: 14px;">
      No site photos available
    </div>
  </div>
</div>

</body>
</html>
