<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
    body {
        margin: 0;
        padding: 0;
        background: white;
    }
    .photo-page {
        width: 210mm;
        height: 297mm;
        page-break-after: always;
        break-after: page;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
    }
    .photo-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
    }
    .photo-image {
        max-width: 70%;
        max-height: 70%;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        margin: auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border: 1px solid #e0e0e0;
        border-radius: 4px;
    }
    /* If image is smaller than max, keep original size */
    .photo-image.small {
        width: auto;
        height: auto;
        max-width: none;
        max-height: none;
    }
    @media print {
        .photo-page {
            page-break-after: always;
            break-after: page;
        }
        .photo-image {
            box-shadow: none;
            border: 1px solid #ccc;
        }
    }
  </style>
</head>
<body>

<th:block th:each="photo : ${sitePhotos}">
  <div class="photo-page">
    <div class="photo-container">
      <img class="photo-image" th:src="${photo}" alt="Site Photo"/>
    </div>
  </div>
</th:block>

<th:block th:if="${sitePhotos == null or sitePhotos.isEmpty()}">
  <div class="photo-page">
    <div class="photo-container">
      <div style="text-align: center; font-family: Arial, sans-serif; color: #999;">
        No site photos available
      </div>
    </div>
  </div>
</th:block>

</body>
</html>
