<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Site Photos - Solar Installation</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: Arial, Helvetica, sans-serif;
        padding: 30px 20px;
        background: white;
    }
    .container {
        max-width: 900px;
        margin: 0 auto;
    }
    h1 {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #333;
    }
    .subtitle {
        text-align: center;
        font-size: 14px;
        margin-bottom: 30px;
        color: #555;
    }
    .photos-grid {
        display: flex;
        flex-direction: column;
        gap: 25px;
    }
    .photo-item {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        background: #f9f9f9;
        page-break-inside: avoid;
        break-inside: avoid;
    }
    .photo-caption {
        font-weight: bold;
        margin-bottom: 10px;
        font-size: 13px;
        color: #333;
    }
    .photo-image {
        text-align: center;
    }
    .photo-image img {
        max-width: 100%;
        max-height: 400px;
        object-fit: contain;
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .no-photos {
        text-align: center;
        padding: 50px;
        color: #999;
        font-style: italic;
    }
    @media print {
        body {
            padding: 0;
        }
        .photo-item {
            break-inside: avoid;
            page-break-inside: avoid;
        }
    }
  </style>
</head>
<body>
<div th:replace="~{pdf/Header :: header}"></div>
<div class="container">
  <h1>Site Installation Photos</h1>
  <div class="subtitle">
    Rooftop Solar PV System Installation - Site Documentation
  </div>

  <div class="photos-grid" th:if="${sitePhotos != null and !sitePhotos.isEmpty()}">
    <div class="photo-item" th:each="photo, iterStat : ${sitePhotos}">
      <div class="photo-caption">
        Photo <span th:text="${iterStat.count}"></span> of <span th:text="${sitePhotos.size()}"></span>
      </div>
      <div class="photo-image">
        <img th:src="${photo}" alt="Site Photo"/>
      </div>
    </div>
  </div>

  <div class="no-photos" th:if="${sitePhotos == null or sitePhotos.isEmpty()}">
    No site photos available for this installation.
  </div>
</div>
</body>
</html>
