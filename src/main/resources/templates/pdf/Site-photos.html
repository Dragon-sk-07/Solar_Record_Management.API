<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
    body {
        margin: 0;
        padding: 0;
        background: white;
    }
  </style>
</head>
<body>

<!-- EXACT SAME AS NET METERING AGREEMENT - with natural padding -->
<div th:each="photo : ${sitePhotos}" style="page-break-after: always;">
  <div style="display: flex; align-items: center; justify-content: center; height: 90vh; padding: 20px;">
    <img th:src="${photo}" style="width: 100%; height: 85vh; object-fit: contain;" alt="Site Photo"/>
  </div>
</div>

</body>
</html>
