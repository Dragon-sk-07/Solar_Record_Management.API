<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
   body {
    margin: 0;
    padding: 0;
    background: white;
}
.photo-page {
    display: flex;
    align-items: center;
    justify-content: center;
    page-break-after: always;
    width: 100%;
    height: 100vh;
    margin: 0;
    padding: 0;
}
.photo-page img {
    max-width: calc(100% - 60px) !important;
    max-height: calc(100vh - 60px) !important;
    width: auto !important;
    height: auto !important;
    object-fit: contain !important;
    display: block;
    margin: 0 auto;
    padding: 30px;
    box-sizing: border-box;
}
  </style>
</head>
<body>

<!-- EXACT SAME AS NET METERING AGREEMENT - with natural padding -->
<div th:each="photo : ${sitePhotos}" style="page-break-after: always;">
  <div class="photo-page">
    <img th:src="${photo}" alt="Site Photo"/>
  </div>
</div>

</body>
</html>
