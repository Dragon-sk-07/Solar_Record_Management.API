<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
    body {
        margin: 0;
        padding: 0;
        background: white;
        text-align: center;
    }
    .photo-page {
        width: 210mm;
        height: 297mm;
        page-break-after: always;
        break-after: page;
        text-align: center;
        vertical-align: middle;
    }
    .photo-container {
        width: 100%;
        height: 100%;
        display: table;
        text-align: center;
    }
    .photo-cell {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
    }
    .photo-image {
        max-width: 80%;
        max-height: 80%;
        width: auto;
        height: auto;
        margin: 0 auto;
        display: inline-block;
        border: 1px solid #ddd;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    @media print {
        .photo-page {
            page-break-after: always;
            break-after: page;
        }
    }
  </style>
</head>
<body>

<th:block th:if="${sitePhotos != null and not sitePhotos.isEmpty()}">
  <div th:each="photo : ${sitePhotos}" class="photo-page">
    <div class="photo-container">
      <div class="photo-cell">
        <img class="photo-image" th:src="${photo}" alt="Site Photo"/>
      </div>
    </div>
  </div>
</th:block>

<th:block th:if="${sitePhotos == null or sitePhotos.isEmpty()}">
  <div class="photo-page">
    <div class="photo-container">
      <div class="photo-cell">
        <p style="font-family: Arial, sans-serif; color: #999;">No site photos available</p>
      </div>
    </div>
  </div>
</th:block>

</body>
</html>
