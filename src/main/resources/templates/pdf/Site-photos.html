<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Site Photo</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    @page {
        margin: 0;
        size: A4;
    }

    body {
        margin: 0;
        padding: 0;
        background: white;
    }

    /* Full page container - exactly one page per image */
    .page {
        width: 210mm;  /* A4 exact width */
        height: 297mm; /* A4 exact height */
        display: table;
        table-layout: fixed;
        page-break-after: always;
        break-after: page;
        background: white;
        margin: 0;
        padding: 0;
    }

    /* Image cell - centers content vertically and horizontally */
    .photo-cell {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
    }

    /* Image styling - centered, original size preserved */
    .photo-image {
        display: inline-block;
        margin: 0 auto;
    }

    .photo-image img {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        display: block;
        margin: 0 auto;
    }

    /* Print-specific styles */
    @media print {
        body {
            margin: 0;
            padding: 0;
        }
        .page {
            page-break-after: always;
            break-after: page;
        }
    }
  </style>
</head>
<body>

<!-- One photo per full blank A4 page - perfectly centered -->
<div th:each="photo : ${sitePhotos}" class="page">
  <div class="photo-cell">
    <div class="photo-image">
      <img th:src="${photo}" alt="Site Photo"/>
    </div>
  </div>
</div>

<!-- No output when no photos exist -->
<th:block th:if="${sitePhotos == null or sitePhotos.isEmpty()}">
</th:block>

</body>
</html>
