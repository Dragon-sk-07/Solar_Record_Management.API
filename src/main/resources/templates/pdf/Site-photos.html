<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Site Photo</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    @page {
        margin: 0;
        size: A4;
    }

    body {
        margin: 0;
        padding: 0;
        background: white;
    }

    /* Full page container */
    .page {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh; /* Full viewport height for screen */
        page-break-after: always;
        break-after: page;
        background: white;
    }

    @media print {
        .page {
            height: 297mm; /* A4 exact height */
            width: 210mm;  /* A4 exact width */
            page-break-after: always;
            break-after: page;
        }

        body {
            print-color-adjust: exact;
            -webkit-print-color-adjust: exact;
        }
    }

    .photo-image {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: white;
    }

    .photo-image img {
        width: 100%;
        height: 100%;
        object-fit: contain; /* Keeps aspect ratio, fits entirely */
        /* Use object-fit: cover; if you want to fill completely (may crop) */
    }
  </style>
</head>
<body>

<!--<div style="text-align: center; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #000;">-->
<!--  <img th:src="${defaultMsedclHeader}" style="max-width: 100%; max-height: 80px; object-fit: contain;" alt="MSEDCL Header"/>-->
<!--</div>-->

<!-- One photo per full blank A4 page -->
<div th:each="photo : ${sitePhotos}" class="page">
  <div class="photo-image">
    <img th:src="${photo}" alt="Site Photo"/>
  </div>
</div>

<th:block th:if="${sitePhotos == null or sitePhotos.isEmpty()}">
</th:block>

</body>
</html>
