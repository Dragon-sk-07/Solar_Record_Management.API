<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
    body {
        margin: 0;
        padding: 0;
        background: white;
    }
    /* EXACT SAME LOGIC AS NET METERING AGREEMENT */
    .photo-page {
        page-break-after: always;
        break-after: page;
    }
    .photo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 90vh;
        width: 100%;
    }
    .photo-image {
        width: 100%;
        height: 85vh;
        object-fit: contain;
    }
    @media print {
        .photo-page {
            page-break-after: always;
            break-after: page;
        }
    }
  </style>
</head>
<body>

<!-- EXACT SAME STRUCTURE AS NET METERING STAMP DISPLAY -->
<th:block th:each="photo : ${sitePhotos}">
  <div class="photo-page">
    <div class="photo-container">
      <img class="photo-image" th:src="${photo}" alt="Site Photo"/>
    </div>
  </div>
</th:block>

<!-- FALLBACK WHEN NO PHOTOS -->
<th:block th:if="${sitePhotos == null or sitePhotos.isEmpty()}">
  <div class="photo-page">
    <div class="photo-container">
      <div style="text-align: center; font-family: Arial, sans-serif; color: #666;">
        No site photos available
      </div>
    </div>
  </div>
</th:block>

</body>
</html>
