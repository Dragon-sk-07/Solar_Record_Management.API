<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
    body {
        margin: 0;
        padding: 0;
        background: white;
    }

    .photo-page {
        page-break-after: always;
        width: 100%;
        height: 100vh;
        margin: 0;
        padding: 0;
        display: table;
    }

    .photo-page-inner {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
        width: 100%;
        height: 100%;
    }

    .photo-page img {
        width: calc(100% - 50px) !important;
        height: calc(100vh - 50px) !important;
        object-fit: fill !important;
        display: inline-block !important;
        margin: 0 auto !important;
        padding: 25px !important;
        box-sizing: border-box;
    }

    @media print {
        .photo-page {
            page-break-after: always;
            page-break-inside: avoid;
        }
        .photo-page img {
            width: calc(100% - 50px) !important;
            height: calc(100% - 50px) !important;
            object-fit: fill !important;
        }
    }
  </style>
</head>
<body>

<!-- EXACT SAME AS NET METERING AGREEMENT - with natural padding -->
<div th:each="photo : ${sitePhotos}">
  <div class="photo-page">
    <div class="photo-page-inner">
      <img th:src="${photo}" alt="Site Photo"/>
    </div>
  </div>
</div>

</body>
</html>
