<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Photos</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    @page {
        margin: 0;
        size: A4;
    }
    body {
        margin: 0;
        padding: 0;
        background: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .photo-page {
        width: 210mm;
        height: 297mm;
        page-break-after: always;
        break-after: page;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
        margin: 0 auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .photo-container {
        width: 90%;
        height: 90%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #2c3e50;
        border-radius: 8px;
        background: #fafafa;
        padding: 15px;
        box-sizing: border-box;
    }
    .photo-image {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        margin: auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    /* For smaller images - never stretch, keep original size */
    .photo-image.small-image {
        width: auto;
        height: auto;
        max-width: 80%;
        max-height: 80%;
    }
    @media print {
        body {
            background: white;
        }
        .photo-page {
            box-shadow: none;
            page-break-after: always;
            break-after: page;
        }
        .photo-container {
            border: 1px solid #ccc;
            box-shadow: none;
        }
    }
  </style>
</head>
<body>

<th:block th:each="photo : ${sitePhotos}">
  <div class="photo-page">
    <div class="photo-container">
      <img class="photo-image" th:src="${photo}" alt="Site Photo"/>
    </div>
  </div>
</th:block>

<th:block th:if="${sitePhotos == null or sitePhotos.isEmpty()}">
  <div class="photo-page">
    <div class="photo-container">
      <div style="text-align: center; font-family: Arial, sans-serif; color: #999; font-size: 14px;">
        No site photos available
      </div>
    </div>
  </div>
</th:block>

</body>
</html>
